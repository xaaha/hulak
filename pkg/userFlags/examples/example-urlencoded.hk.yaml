# yaml-language-server: $schema=https://raw.githubusercontent.com/xaaha/hulak/main/assets/schema.json
---
# Example application/x-www-form-urlencoded POST. The classic HTML form
# post style: simple key=value pairs, no file uploads. httpbin.org/post
# echoes the request back so you can see how it was parsed.
#
# Hulak sets Content-Type: application/x-www-form-urlencoded automatically
# when the body uses urlencodedformdata.
#
# Run with: hulak -fp example-urlencoded.hk.yaml
method: POST
url: https://httpbin.org/post
headers:
  Accept: application/json
body:
  urlencodedformdata:
    name: hulak
    role: cli
