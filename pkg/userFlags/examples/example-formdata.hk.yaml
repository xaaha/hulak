# yaml-language-server: $schema=https://raw.githubusercontent.com/xaaha/hulak/main/assets/schema.json
---
# Example multipart/form-data POST. Use this style for file uploads or
# any binary-safe payload. For plain key=value pairs (HTML-form style),
# use `hulak example urlencoded` instead.
#
# Hulak sets Content-Type: multipart/form-data (with boundary) automatically.
# httpbin.org/post echoes the request back so you can see how it was parsed.
#
# Run with: hulak -fp example-formdata.hk.yaml
method: POST
url: https://httpbin.org/post
headers:
  Accept: application/json
body:
  formdata:
    name: hulak
    role: cli
