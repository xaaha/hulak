---
name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test ./... -timeout 60s
  docs-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Regenerate docs
        run: go generate ./pkg/userFlags/...
      - name: Check content drift
        run: |
          # Generated files must be tracked in git so tag checkouts have
          # them (goreleaser archives reference these paths). Catch the
          # untracked-file case explicitly — git diff silently ignores it.
          generated=(
            man/hulak.1
            completions/hulak.zsh
            completions/hulak.bash
          )
          for f in "${generated[@]}"; do
            if ! git ls-files --error-unmatch "$f" >/dev/null 2>&1; then
              echo "::error::$f is not tracked. Add it to git and commit."
              exit 1
            fi
          done
          # Compare content, ignoring whitespace-only differences so editor
          # auto-formatting doesn't cause false failures.
          if ! git diff --ignore-all-space --ignore-blank-lines --exit-code -- "${generated[@]}"; then
            echo ""
            echo "::error::Generated docs/completions are out of date. Run 'mise gendocs' (or 'hulak gendocs') and commit the result."
            exit 1
          fi
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Format check
        run: |
          go fmt ./...
          git diff --exit-code
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1
